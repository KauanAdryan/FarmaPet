<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Farmácia Pet - Gerenciamento de Clientes</title>
  <meta name="description" content="Sistema de gerenciamento de clientes para pets" />

  <!-- Fontes e ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/telaInicial.css" />
  <link rel="stylesheet" href="css/ListarCliente..css" />
</head>

<body>
  <header class="header">
    <div class="header-left">
      <a href="telaInicial.html" class="home-icon" aria-label="Página inicial">🏠</a>

      <nav class="menu-cadastros">
        <button
          class="btn-cadastros"
          aria-expanded="false"
          aria-controls="dropdown-cadastros"
          aria-haspopup="true"
          aria-label="Abrir menu de cadastros"
        >
          <span>Cadastros</span>
        </button>

        <ul id="dropdown-cadastros" class="dropdown-cadastros" role="menu" aria-hidden="true">
          <li role="none"><a href="CadastroCliente.html" role="menuitem">Cadastro Cliente</a></li>
          <li role="none"><a href="CadastroRemedio.html" role="menuitem">Cadastro Remédio</a></li>
          <li role="none"><a href="CadastroPet.html" role="menuitem">Cadastro Pet</a></li>
        </ul>
      </nav>
    </div>

    <button class="user-icon" aria-label="Perfil do usuário">👤</button>
  </header>

  <main class="main-content">
    <section class="search-section">
      <div class="search-container">
        <div class="search-input-group">
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar por nome, CPF ou email..."
            aria-label="Buscar clientes"
          />
          <button id="searchButton" aria-label="Pesquisar">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>
    </section>

    <section class="clientes-grid">
      <div id="gridClientes" role="grid" aria-label="Lista de clientes"></div>
    </section>
  </main>

  <!-- Modal de detalhes -->
  <div
    id="clienteModal"
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalClienteTitle"
    aria-hidden="true"
    style="display: none;"
  >
    <div class="modal-content">
      <button class="close-modal" aria-label="Fechar modal">&times;</button>

      <div class="modal-header">
        <h2 id="modalClienteTitle">Detalhes do Cliente</h2>
      </div>

      <div class="modal-body">
        <div class="modal-photo-preview" aria-hidden="true">
          <div class="client-avatar">
            <i class="fas fa-user"></i>
          </div>
        </div>

        <div class="modal-info">
          <div class="info-row">
            <strong>Nome:</strong>
            <span id="modalNome"></span>
          </div>
          <div class="info-row">
            <strong>CPF:</strong>
            <span id="modalCpf"></span>
          </div>
          <div class="info-row">
            <strong>Data de Nascimento:</strong>
            <span id="modalDataNasc"></span>
          </div>
          <div class="info-row">
            <strong>Email:</strong>
            <span id="modalEmail"></span>
          </div>
          <div class="info-row">
            <strong>Telefone:</strong>
            <span id="modalTelefone"></span>
          </div>
          <div class="info-row">
            <strong>Endereço:</strong>
            <span id="modalEndereco"></span>
          </div>
          <div class="info-row">
            <strong>Pets:</strong>
            <span id="modalPets"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="message-container" role="status" aria-live="polite"></div>

  <!-- Modal de Edição -->
  <div
    id="editClienteModal"
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalEditTitle"
    aria-hidden="true"
    style="display: none;"
  >
    <div class="modal-content">
      <button class="close-edit-modal close-modal" aria-label="Fechar modal">&times;</button>

      <div class="modal-header">
        <h2 id="modalEditTitle">Editar Cliente</h2>
      </div>

      <form id="formEditarCliente" class="modal-body" novalidate>
        <div class="info-row">
          <label for="editNome"><strong>Nome:</strong></label>
          <input type="text" id="editNome" name="nome" required autocomplete="name" />
        </div>
        <div class="info-row">
          <label for="editCpf"><strong>CPF:</strong></label>
          <input
            type="text"
            id="editCpf"
            name="cpf"
            required
            maxlength="11"
            pattern="\d{11}"
            title="CPF deve conter 11 números"
            autocomplete="off"
          />
        </div>
        <div class="info-row">
          <label for="editDataNasc"><strong>Data de Nascimento:</strong></label>
          <input type="date" id="editDataNasc" name="dataNasc" />
        </div>
        <div class="info-row">
          <label for="editEmail"><strong>Email:</strong></label>
          <input type="email" id="editEmail" name="email" autocomplete="email" />
        </div>
        <div class="info-row">
          <label for="editTelefone"><strong>Telefone:</strong></label>
          <input type="tel" id="editTelefone" name="telefone" autocomplete="tel" />
        </div>

        <div class="modal-footer" style="margin-top: 1em;">
          <button type="submit">Salvar</button>
          <button type="button" id="btnCancelarEdicao">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/ListaCliente.js"></script>
</body>

</html>
