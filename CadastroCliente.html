<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tela Cadastro Cliente</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/cadastros.css" />
</head>
<body id="CadastroCliente">
  <header>
    <div class="header-left">
      <a href="telaInicial.html" class="home-icon" aria-label="Página Inicial">🏠</a>

      <nav class="menu-cadastros" aria-label="Menu de Cadastros">
        <button class="btn-cadastros" aria-haspopup="true" aria-expanded="false">Cadastros</button>
        <ul class="dropdown-cadastros" role="menu" hidden>
          <li role="none"><a href="CadastroCliente.html" role="menuitem">Cadastro Cliente</a></li>
          <li role="none"><a href="CadastroRemedio.html" role="menuitem">Cadastro Remédio</a></li>
          <li role="none"><a href="CadastroPet.html" role="menuitem">Cadastro Pet</a></li>
        </ul>
      </nav>
    </div>

    <button class="user-icon" aria-label="Perfil do Usuário">👤</button>
  </header>

  <main>
    <form id="clienteForm" class="form-cadastro">
      <h2>Dados Pessoais</h2>

      <div class="input-row">
        <div class="input-group">
          <label for="nome">Nome Completo:</label>
          <input type="text" id="nome" required />
        </div>
        <div class="input-group">
          <label for="cpf">CPF:</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" required />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="dataNasc">Data de Nascimento:</label>
          <input type="date" id="dataNasc" required />
        </div>
        <div class="input-group">
          <label for="telefone">Telefone:</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" required />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="email">E-mail:</label>
          <input type="email" id="email" required />
        </div>
      </div>

      <h2>Endereço</h2>

      <div class="input-row">
        <div class="input-group">
          <label for="cep">CEP:</label>
          <input type="text" id="cep" placeholder="00000-000" required />
        </div>
        <div class="input-group">
          <button type="button" id="buscarCep">Buscar CEP</button>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="uf">Estado (UF):</label>
          <input type="text" id="uf" maxlength="2" placeholder="SP" required />
        </div>
        <div class="input-group">
          <label for="cidade">Cidade:</label>
          <input type="text" id="cidade" required />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="bairro">Bairro:</label>
          <input type="text" id="bairro" required />
        </div>
        <div class="input-group">
          <label for="rua">Rua:</label>
          <input type="text" id="rua" required />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="numero">Número:</label>
          <input type="text" id="numero" required />
        </div>
        <div class="input-group">
          <label for="complemento">Complemento:</label>
          <input type="text" id="complemento" />
        </div>
      </div>

      <button type="submit" class="btn-cadastrar">Cadastrar Cliente</button>
    </form>
  </main>
  <script src="js/scriptCadastros.js"></script>
  <script>
    // Script para toggle dropdown menu
    const btnCadastros = document.querySelector('.btn-cadastros');
    const dropdown = document.querySelector('.dropdown-cadastros');

    btnCadastros.addEventListener('click', () => {
      const expanded = btnCadastros.getAttribute('aria-expanded') === 'true';
      btnCadastros.setAttribute('aria-expanded', !expanded);
      if (!expanded) {
        dropdown.removeAttribute('hidden');
        dropdown.classList.add('show');
      } else {
        dropdown.setAttribute('hidden', '');
        dropdown.classList.remove('show');
      }
    });

    // Fecha dropdown ao clicar fora
    document.addEventListener('click', (e) => {
      if (!btnCadastros.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.setAttribute('hidden', '');
        dropdown.classList.remove('show');
        btnCadastros.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
