<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tela Cadastro Cliente</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="cadastros.css" />
</head>
<body id="CadastroCliente">
<header>
  <div class="header-left">
    <a href="telaInicial.html" class="home-icon">🏠</a>
    <div class="menu-cadastros">
      <button class="btn-cadastros">Cadastros</button>
      <ul class="dropdown-cadastros">
        <li><a href="CadastroCliente.html">Cadastro Cliente</a></li>
        <li><a href="CadastroRemedio.html">Cadastro Remédio</a></li>
        <li><a href="CadastroPet.html">Cadastro Pet</a></li>
      </ul>
    </div>
  </div>
  <div class="user-icon">👤</div>
</header>

  <main>
    <form class="form-cadastro">
      <h2>Preencha as informações</h2>

      <div class="input-row">
        <div class="input-group">
          <label for="nome">Nome completo:</label>
          <input type="text" id="nome" />
        </div>
        <div class="input-group">
          <label for="idade">Idade:</label>
          <input type="number" id="idade" />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="cpf">CPF:</label>
          <input type="text" id="cpf" />
        </div>
        <div class="input-group">
          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="email">Email:</label>
          <input type="email" id="email" />
        </div>
        <div class="input-group">
          <label for="cep">CEP:</label>
          <input type="text" id="cep" />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="logradouro">Logradouro:</label>
          <input type="text" id="logradouro" />
        </div>
        <div class="input-group">
          <label for="numero">Número:</label>
          <input type="text" id="numero" />
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="cidade">Cidade:</label>
          <input type="text" id="cidade" />
        </div>
        <div class="input-group">
          <label for="complemento">Complemento:</label>
          <input type="text" id="complemento" />
        </div>
      </div>

      <button type="submit" class="btn-cadastrar">Cadastrar</button>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
